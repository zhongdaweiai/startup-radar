services:
  - type: web
    name: startup-radar
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run db:schema && npm run ingest:techcrunch && npm run start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: startup-radar-db
          property: connectionString
      - key: TECHCRUNCH_FEEDS
        value: https://techcrunch.com/feed/,https://techcrunch.com/category/startups/feed/
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

  - type: cron
    name: startup-radar-techcrunch-ingest
    runtime: node
    plan: free
    schedule: "*/15 * * * *"
    buildCommand: npm ci
    startCommand: npm run ingest:techcrunch
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: startup-radar-db
          property: connectionString
      - key: TECHCRUNCH_FEEDS
        value: https://techcrunch.com/feed/,https://techcrunch.com/category/startups/feed/

databases:
  - name: startup-radar-db
    plan: free
    databaseName: startup_radar
    user: startup_radar
